<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panini FIFA World Cup 2026 — Adrenalyn XL Tracker</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
      --owned-bg: #e6f4ea;
      --owned-fg: #0a7a2f;
      --pos-gk: #7a3fb2;
      --pos-def: #d33a3a;
      --pos-mid: #e6811a;
      --pos-fwd: #2ea150;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --fg: #eaeaea;
        --muted: #999;
        --border: #333;
        --owned-bg: #14361f;
        --owned-fg: #7fd394;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--fg); }
    header { padding: 1rem; border-bottom: 1px solid var(--border); }
    header h1 { margin: 0 0 .25rem; font-size: 1.1rem; }
    .overall { font-size: 2rem; font-weight: 700; }
    .overall .pct { font-size: 1rem; color: var(--muted); margin-left: .5rem; }
    .bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: .5rem; overflow: hidden; }
    .bar > div { height: 100%; background: var(--owned-fg); transition: width .2s; }
    main { display: grid; grid-template-columns: 300px 1fr; gap: 1rem; padding: 1rem; }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: .5rem; }
    .tile {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .5rem;
      font-size: .8rem;
      cursor: pointer;
      user-select: none;
      opacity: .55;
      background: var(--bg);
    }
    .tile.owned { opacity: 1; background: var(--owned-bg); border-color: var(--owned-fg); }
    .tile .num { font-weight: 700; }
    .tile .name { display: block; margin-top: .25rem; }
    .tile .meta { color: var(--muted); font-size: .7rem; }
  </style>
</head>
<body>
  <header>
    <h1>Panini FIFA World Cup 2026 — Adrenalyn XL</h1>
    <div class="overall"><span id="ownedCount">0</span> / 630 <span class="pct" id="ownedPct">0%</span></div>
    <div class="bar"><div id="overallBar" style="width:0%"></div></div>
  </header>
  <main>
    <aside id="summary"></aside>
    <section id="grid"></section>
  </main>

  <script>
  // ==== Pure logic (testable) ====
  window.__paniniApp = {
    TOTAL_CARDS: 630,

    parseQuickAdd(input) {
      const valid = [];
      const errors = [];
      if (!input || !input.trim()) return { valid, errors };
      const tokens = input.split(/[\s,]+/).filter(Boolean);
      for (const tok of tokens) {
        const m = tok.match(/^(\d+)-(\d+)$/);
        if (m) {
          const a = parseInt(m[1], 10), b = parseInt(m[2], 10);
          if (a > b || a < 1 || b > 630) { errors.push(tok); continue; }
          for (let n = a; n <= b; n++) valid.push(n);
          continue;
        }
        if (/^\d+$/.test(tok)) {
          const n = parseInt(tok, 10);
          if (n < 1 || n > 630) { errors.push(tok); continue; }
          valid.push(n);
          continue;
        }
        errors.push(tok);
      }
      return { valid, errors };
    },

    computeStats(checklist, collection) {
      const byNumber = new Map(checklist.map(c => [c.number, c]));
      let owned = 0;
      const perTeam = {};
      const perSection = {};

      for (const c of checklist) {
        if (c.team && c.section === 'team') {
          perTeam[c.team] = perTeam[c.team] || { owned: 0, total: 0, name: c.teamName };
          perTeam[c.team].total++;
        }
        perSection[c.section] = perSection[c.section] || { owned: 0, total: 0 };
        perSection[c.section].total++;
      }

      for (const [numStr, count] of Object.entries(collection)) {
        if (!count || count < 1) continue;
        const n = parseInt(numStr, 10);
        const card = byNumber.get(n);
        if (!card) continue;
        owned++;
        if (card.team && card.section === 'team') perTeam[card.team].owned++;
        perSection[card.section].owned++;
      }

      return {
        owned,
        total: checklist.length,
        pct: Math.round(100 * owned / checklist.length),
        perTeam,
        perSection,
      };
    },
  };
</script>

  <script>
  // ==== Boot ====
  (async () => {
    const TOTAL_CARDS = 630;
    const grid = document.getElementById('grid');
    let checklist;
    try {
      const res = await fetch('checklist.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      checklist = await res.json();
    } catch (err) {
      console.error('Failed to load checklist.json:', err);
      return;
    }

    for (const c of checklist) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.number = c.number;

      const num = document.createElement('span');
      num.className = 'num';
      num.textContent = '#' + c.number;

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = c.player;

      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = c.team || c.section;

      tile.append(num, name, meta);
      grid.appendChild(tile);
    }
  })();
  </script>
</body>
</html>
