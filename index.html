<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panini FIFA World Cup 2026 — Adrenalyn XL Tracker</title>
  <script>
    // Apply saved theme BEFORE CSS parses to avoid a flash of the wrong theme.
    (function() {
      try {
        const t = localStorage.getItem('panini_wc2026_theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (_) { /* storage disabled — stay on auto */ }
    })();
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
      --owned-bg: #e6f4ea;
      --owned-fg: #0a7a2f;
      --pitch: #0a7a2f;
      --pitch-soft: #d5ebda;
      --header-grad-1: #0a7a2f;
      --header-grad-2: #0e9e40;
      --pos-gk: #7a3fb2;
      --pos-def: #d33a3a;
      --pos-mid: #e6811a;
      --pos-fwd: #2ea150;
    }
    @media (prefers-color-scheme: dark) {
      [data-theme="auto"] {
        --bg: #121212;
        --fg: #eaeaea;
        --muted: #999;
        --border: #333;
        --owned-bg: #14361f;
        --owned-fg: #7fd394;
        --pitch: #7fd394;
        --pitch-soft: #1a2f22;
        --header-grad-1: #0a2f18;
        --header-grad-2: #14361f;
      }
    }
    [data-theme="dark"] {
      --bg: #121212;
      --fg: #eaeaea;
      --muted: #999;
      --border: #333;
      --owned-bg: #14361f;
      --owned-fg: #7fd394;
      --pitch: #7fd394;
      --pitch-soft: #1a2f22;
      --header-grad-1: #0a2f18;
      --header-grad-2: #14361f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      background-image:
        radial-gradient(circle at 1px 1px, var(--pitch-soft) 1px, transparent 0);
      background-size: 24px 24px;
      background-attachment: fixed;
    }
    header {
      padding: 1rem;
      border-bottom: 2px solid var(--pitch);
      background: linear-gradient(135deg, var(--header-grad-1), var(--header-grad-2));
      color: #fff;
    }
    header h1 {
      margin: 0 0 .25rem;
      font-size: 1.15rem;
      letter-spacing: .02em;
      font-weight: 700;
    }
    header h1::before { content: '⚽ '; }
    header .overall { color: #fff; }
    header .overall .pct { color: rgba(255,255,255,.75); }
    header .bar { background: rgba(255,255,255,.2); }
    header .bar > div { background: #fff; }
    header .legend { color: rgba(255,255,255,.85); }
    header h1 { margin: 0; }
    header .subtitle {
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      opacity: .85;
      margin-top: .1rem;
      margin-bottom: .35rem;
    }
    .overall { font-size: 2rem; font-weight: 700; }
    .overall .pct { font-size: 1rem; color: var(--muted); margin-left: .5rem; }
    .bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: .5rem; overflow: hidden; }
    .bar > div { height: 100%; background: var(--owned-fg); transition: width .2s; }
    main { display: grid; grid-template-columns: 300px 1fr; gap: 1rem; padding: 1rem; align-items: start; }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: .5rem; align-content: start; }
    .tile {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .5rem;
      font-size: .8rem;
      cursor: pointer;
      user-select: none;
      opacity: .55;
      background: var(--bg);
      min-height: 4.75rem;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .tile.owned { opacity: 1; background: var(--owned-bg); border-color: var(--owned-fg); }
    .tile.reserved {
      opacity: 1;
      background: #fff1de;
      border-color: #e6811a;
    }
    [data-theme="dark"] .tile.reserved { background: #3a2a10; border-color: #e6811a; }
    @media (prefers-color-scheme: dark) {
      [data-theme="auto"] .tile.reserved { background: #3a2a10; border-color: #e6811a; }
    }
    .tile .rsv { color: #e6811a; font-size: .7rem; margin-left: .2rem; font-weight: 600; }
    .tile .num { font-weight: 700; }
    .tile .name { display: block; margin-top: .25rem; padding-right: 1rem; }
    .tile .meta { color: var(--muted); font-size: .7rem; margin-top: auto; }
    .tile .pos {
      position: absolute; top: .4rem; right: .4rem;
      width: .6rem; height: .6rem; border-radius: 2px;
    }
    .pos-gk,  .pos-swatch.pos-gk  { background: var(--pos-gk); }
    .pos-def, .pos-swatch.pos-def { background: var(--pos-def); }
    .pos-mid, .pos-swatch.pos-mid { background: var(--pos-mid); }
    .pos-fwd, .pos-swatch.pos-fwd { background: var(--pos-fwd); }
    .legend {
      display: flex; flex-wrap: wrap;
      gap: .8rem;
      margin-top: .5rem;
      font-size: .75rem;
      color: var(--muted);
    }
    .legend-item { display: inline-flex; align-items: center; gap: .3rem; }
    .pos-swatch {
      display: inline-block;
      width: .6rem; height: .6rem; border-radius: 2px;
    }
    .tile .dup { color: var(--muted); font-size: .7rem; margin-left: .2rem; font-weight: normal; }
    .banner {
      background: #fff3cd; color: #664d03;
      padding: .5rem 1rem;
      border-bottom: 1px solid #d5a900;
      font-size: .85rem;
    }
    .banner.error {
      background: #f8d7da; color: #58151c;
      border-bottom-color: #b02a37;
    }
    .banner button {
      margin-left: .5rem; padding: .2rem .5rem;
      background: transparent; color: inherit;
      border: 1px solid currentColor; border-radius: 4px;
      cursor: pointer; font: inherit; font-size: .8rem;
    }
    @media (prefers-color-scheme: dark) {
      [data-theme="auto"] .banner { background: #3a2e00; color: #fbe9a0; border-bottom-color: #6b5100; }
      [data-theme="auto"] .banner.error { background: #4a1a1e; color: #f5b7bd; border-bottom-color: #a3444d; }
    }
    [data-theme="dark"] .banner { background: #3a2e00; color: #fbe9a0; border-bottom-color: #6b5100; }
    [data-theme="dark"] .banner.error { background: #4a1a1e; color: #f5b7bd; border-bottom-color: #a3444d; }
    #toolbar {
      position: sticky; top: 0; z-index: 5;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: .5rem 1rem; display: flex; gap: 1rem; align-items: center;
      flex-wrap: wrap;
    }
    #quickAddForm { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
    #quickAddForm input {
      padding: .3rem .5rem; font: inherit; color: var(--fg);
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      min-width: 220px;
    }
    #quickAddForm button {
      padding: .3rem .8rem; cursor: pointer;
      background: var(--owned-fg); color: white; border: 0; border-radius: 4px;
    }
    #quickAddForm button:hover { filter: brightness(1.05); }
    #quickAddForm .err { color: #b00020; font-size: .8rem; }
    @media (prefers-color-scheme: dark) {
      [data-theme="auto"] #quickAddForm .err { color: #f5b7bd; }
    }
    [data-theme="dark"] #quickAddForm .err { color: #f5b7bd; }
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--owned-fg); color: white;
      padding: .5rem 1rem; border-radius: 4px;
      opacity: 0; transition: opacity .3s;
      pointer-events: none; z-index: 20;
    }
    .toast.show { opacity: 1; }
    #summary h3 {
      margin: .8rem 0 .4rem;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }
    #summary h3:first-child { margin-top: 0; }
    .summary-row {
      display: grid; grid-template-columns: 70px 1fr 60px;
      gap: .5rem; align-items: center;
      padding: .25rem .3rem;
      cursor: pointer;
      font-size: .8rem;
      border-radius: 4px;
    }
    .summary-row.section { grid-template-columns: 140px 1fr 60px; }
    .summary-row .lbl {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .summary-row:hover { background: rgba(127,127,127,.1); }
    .summary-row.active { background: var(--owned-bg); }
    .summary-row.complete { background: var(--owned-bg); }
    .summary-row.complete .lbl { color: var(--owned-fg); }
    .summary-row.complete .num { color: var(--owned-fg); font-weight: 600; }
    .summary-row.complete.active { outline: 2px solid var(--owned-fg); outline-offset: -2px; }
    .summary-row.complete-incoming { background: #fff1de; }
    .summary-row.complete-incoming .lbl { color: #e6811a; }
    .summary-row.complete-incoming .num { color: #e6811a; font-weight: 600; }
    .summary-row.complete-incoming .bar > div { background: #e6811a; }
    .summary-row.complete-incoming.active { outline: 2px solid #e6811a; outline-offset: -2px; }
    [data-theme="dark"] .summary-row.complete-incoming { background: #3a2a10; }
    @media (prefers-color-scheme: dark) {
      [data-theme="auto"] .summary-row.complete-incoming { background: #3a2a10; }
    }
    .summary-row .num { color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; }
    .summary-row .bar { height: 4px; margin: 0; }
    #clearFilter {
      margin-top: 1rem;
      padding: .3rem .6rem;
      background: transparent; color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; font: inherit;
    }
    #clearFilter:hover { background: rgba(127,127,127,.1); }
    #searchInput {
      padding: .3rem .5rem; font: inherit; color: var(--fg);
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      min-width: 340px;
    }
    #chips { display: flex; gap: .25rem; flex-wrap: wrap; }
    .chip {
      padding: .3rem .7rem;
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 999px;
      cursor: pointer; font: inherit; font-size: .8rem;
    }
    .chip:hover { background: rgba(127,127,127,.1); }
    .chip.active { background: var(--owned-fg); color: white; border-color: var(--owned-fg); }
    #exportMenu { position: relative; }
    #exportMenu > summary {
      list-style: none; cursor: pointer;
      padding: .3rem .6rem; border: 1px solid var(--border); border-radius: 4px;
      font-size: .8rem; user-select: none;
    }
    #exportMenu > summary::-webkit-details-marker { display: none; }
    #exportMenu ul {
      position: absolute; right: 0; top: 100%;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      list-style: none; margin: .2rem 0 0; padding: .25rem;
      z-index: 10; min-width: 160px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    #exportMenu li { list-style: none; }
    #exportMenu li button {
      display: block; width: 100%; text-align: left;
      padding: .3rem .5rem;
      background: transparent; color: var(--fg);
      border: 0; border-radius: 4px;
      cursor: pointer; font: inherit; font-size: .8rem;
    }
    #exportMenu li button:hover { background: rgba(127,127,127,.1); }
    .import-lbl {
      cursor: pointer;
      padding: .3rem .6rem; border: 1px solid var(--border); border-radius: 4px;
      font-size: .8rem;
    }
    .import-lbl:hover { background: rgba(127,127,127,.1); }
    .theme-toggle {
      cursor: pointer;
      padding: .3rem .6rem;
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      font: inherit; font-size: .8rem;
      min-width: 90px;
    }
    .theme-toggle:hover { background: rgba(127,127,127,.1); }
    dialog {
      max-width: 90vw; padding: 1rem;
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 8px;
    }
    dialog::backdrop { background: rgba(0,0,0,.4); }
    dialog h3 { margin: 0 0 .5rem; font-size: 1rem; }
    dialog textarea {
      width: 100%; font-family: ui-monospace, monospace; font-size: .85rem;
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px; padding: .5rem;
      resize: vertical;
    }
    dialog menu {
      list-style: none; margin: .8rem 0 0; padding: 0;
      display: flex; gap: .5rem; justify-content: flex-end;
    }
    dialog menu button {
      padding: .3rem .8rem; cursor: pointer; font: inherit;
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
    }
    dialog menu button:first-child {
      background: var(--owned-fg); color: white; border-color: var(--owned-fg);
    }
  </style>
</head>
<body>
  <div id="banner" class="banner" role="status" aria-live="polite" hidden></div>
  <header>
    <h1>FIFA World Cup 2026 — Adrenalyn XL</h1>
    <div class="subtitle">Canada · Mexico · USA</div>
    <div class="overall"><span id="ownedCount">0</span> / <span id="ownedTotal">0</span> <span class="pct" id="ownedPct">0%</span></div>
    <div class="bar"><div id="overallBar" style="width:0%"></div></div>
    <div class="legend" aria-label="Position colour legend">
      <span class="legend-item"><span class="pos-swatch pos-gk"></span>GK</span>
      <span class="legend-item"><span class="pos-swatch pos-def"></span>DEF</span>
      <span class="legend-item"><span class="pos-swatch pos-mid"></span>MID</span>
      <span class="legend-item"><span class="pos-swatch pos-fwd"></span>FWD</span>
    </div>
  </header>
  <div id="toolbar">
    <form id="quickAddForm">
      <input id="quickAdd" type="text" placeholder="Add cards: 10, 15, 22-25" autocomplete="off" spellcheck="false">
      <button type="submit">Add</button>
      <span id="quickAddError" class="err" role="status" aria-live="polite"></span>
    </form>
    <input id="searchInput" type="search" placeholder="Search #, team, player, or GK/DEF/MID/FWD…" autocomplete="off" spellcheck="false">
    <div id="chips" role="group" aria-label="Filter cards">
      <button type="button" class="chip active" data-chip="all">All</button>
      <button type="button" class="chip" data-chip="owned">Owned</button>
      <button type="button" class="chip" data-chip="missing">Missing</button>
      <button type="button" class="chip" data-chip="incoming">Incoming</button>
      <button type="button" class="chip" data-chip="doubles">Doubles</button>
    </div>
    <details id="exportMenu" class="menu">
      <summary>Export ▾</summary>
      <ul>
        <li><button type="button" data-export="json">JSON backup</button></li>
        <li><button type="button" data-export="missing">Missing list</button></li>
        <li><button type="button" data-export="incoming">Incoming list</button></li>
        <li><button type="button" data-export="doubles">Doubles list</button></li>
      </ul>
    </details>
    <label class="import-lbl">
      Import
      <input type="file" id="importFile" accept="application/json,.json" hidden>
    </label>
    <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle color theme" title="Toggle theme">🖥 Auto</button>
  </div>
  <main>
    <aside id="summary"></aside>
    <section id="grid"></section>
  </main>

  <script>
  // ==== Pure logic (testable) ====
  window.__paniniApp = {
    TOTAL_CARDS: 630,

    parseQuickAdd(input) {
      const valid = [];
      const errors = [];
      if (!input || !input.trim()) return { valid, errors };
      const tokens = input.split(/[\s,]+/).filter(Boolean);
      for (const tok of tokens) {
        const m = tok.match(/^(\d+)-(\d+)$/);
        if (m) {
          const a = parseInt(m[1], 10), b = parseInt(m[2], 10);
          if (a > b || a < 1 || b > 630) { errors.push(tok); continue; }
          for (let n = a; n <= b; n++) valid.push(n);
          continue;
        }
        if (/^\d+$/.test(tok)) {
          const n = parseInt(tok, 10);
          if (n < 1 || n > 630) { errors.push(tok); continue; }
          valid.push(n);
          continue;
        }
        errors.push(tok);
      }
      return { valid, errors };
    },

    computeStats(checklist, collection, reserved) {
      reserved = reserved || {};
      const byNumber = new Map(checklist.map(c => [c.number, c]));
      let owned = 0;
      const perTeam = {};
      const perSection = {};

      for (const c of checklist) {
        if (c.team && c.section === 'team') {
          perTeam[c.team] = perTeam[c.team] || { owned: 0, incoming: 0, total: 0, name: c.teamName };
          perTeam[c.team].total++;
        }
        perSection[c.section] = perSection[c.section] || { owned: 0, incoming: 0, total: 0 };
        perSection[c.section].total++;
      }

      for (const c of checklist) {
        const count = collection[c.number] || 0;
        if (count >= 1) {
          owned++;
          if (c.team && c.section === 'team') perTeam[c.team].owned++;
          perSection[c.section].owned++;
        } else if (reserved[c.number]) {
          if (c.team && c.section === 'team') perTeam[c.team].incoming++;
          perSection[c.section].incoming++;
        }
      }

      return {
        owned,
        total: checklist.length,
        pct: Math.round(100 * owned / checklist.length),
        perTeam,
        perSection,
      };
    },

    SECTION_LABELS: {
      golden: 'Golden Ballers',
      team: null,   // for team cards, group by team name instead
      contenders: 'Contenders',
      goalMachines: 'Goal Machines',
      topKeepers: 'Top Keepers',
      defensiveRocks: 'Defensive Rocks',
      midfieldMaestros: 'Midfield Maestros',
      masterRookies: 'Master Rookies',
      extras: 'Extras',
    },

    SECTION_ORDER: [
      'golden', 'team', 'contenders', 'goalMachines',
      'topKeepers', 'defensiveRocks', 'midfieldMaestros',
      'masterRookies', 'extras',
    ],

    // FIFA 3-letter code → ISO 3166-1 alpha-2 (for building regional-indicator flag emoji).
    // Two exceptions bypass the map: ENG and SCO — those need tag-sequence emoji
    // (🏴󠁧󠁢󠁥󠁮󠁧󠁿, 🏴󠁧󠁢󠁳󠁣󠁴󠁿) and are stored as literal strings in teamFlag().
    FIFA_TO_ISO2: {
      ALG: 'DZ', ARG: 'AR', AUS: 'AU', AUT: 'AT', BEL: 'BE', BRA: 'BR',
      CAN: 'CA', CIV: 'CI', COL: 'CO', CPV: 'CV', CRO: 'HR', CUW: 'CW',
      ECU: 'EC', EGY: 'EG', ESP: 'ES', FRA: 'FR', GER: 'DE', GHA: 'GH',
      HAI: 'HT', IRN: 'IR', JOR: 'JO', JPN: 'JP', KOR: 'KR', KSA: 'SA',
      MAR: 'MA', MEX: 'MX', NED: 'NL', NOR: 'NO', NZL: 'NZ', PAN: 'PA',
      PAR: 'PY', POR: 'PT', QAT: 'QA', RSA: 'ZA', SEN: 'SN', SUI: 'CH',
      TUN: 'TN', URU: 'UY', USA: 'US', UZB: 'UZ',
    },

    teamFlag(fifaCode) {
      // England and Scotland aren't ISO2 countries — use their tag-sequence flags.
      if (fifaCode === 'ENG') return '🏴󠁧󠁢󠁥󠁮󠁧󠁿';
      if (fifaCode === 'SCO') return '🏴󠁧󠁢󠁳󠁣󠁴󠁿';
      const iso = this.FIFA_TO_ISO2[fifaCode];
      if (!iso) return '';
      // Regional Indicator Symbol Letters A-Z start at U+1F1E6.
      const OFFSET = 0x1F1E6 - 'A'.charCodeAt(0);
      return String.fromCodePoint(iso.charCodeAt(0) + OFFSET, iso.charCodeAt(1) + OFFSET);
    },

    _groupByLabel(checklist, filter) {
      const groups = new Map();
      const groupOrder = [];
      for (const sec of this.SECTION_ORDER) {
        for (const c of checklist) {
          if (c.section !== sec) continue;
          if (!filter(c)) continue;
          const label = (sec === 'team') ? c.teamName : this.SECTION_LABELS[sec];
          if (!groups.has(label)) { groups.set(label, []); groupOrder.push(label); }
          groups.get(label).push(c.number);
        }
      }
      return { groups, groupOrder };
    },

    formatMissingList(checklist, collection, reserved) {
      reserved = reserved || {};
      // Missing = cards not owned AND not marked incoming.
      // Incoming cards are treated as half-owned and reported via formatIncomingList instead.
      const missing = c => (!collection[c.number] || collection[c.number] < 1) && !reserved[c.number];
      const { groups, groupOrder } = this._groupByLabel(checklist, missing);
      const totalMissing = checklist.filter(missing).length;
      const lines = [`Missing (${totalMissing}):`];
      for (const label of groupOrder) {
        lines.push(`${label}: ${groups.get(label).join(', ')}`);
      }
      return lines.join('\n');
    },

    formatIncomingList(checklist, collection, reserved) {
      reserved = reserved || {};
      const incoming = c => (!collection[c.number] || collection[c.number] < 1) && !!reserved[c.number];
      const { groups, groupOrder } = this._groupByLabel(checklist, incoming);
      const totalIncoming = checklist.filter(incoming).length;
      const lines = [`Incoming (${totalIncoming}):`];
      for (const label of groupOrder) {
        lines.push(`${label}: ${groups.get(label).join(', ')}`);
      }
      return lines.join('\n');
    },

    formatDoublesList(checklist, collection) {
      const dbl = c => (collection[c.number] || 0) >= 2;
      const { groups, groupOrder } = this._groupByLabel(checklist, dbl);
      const totalDoubles = checklist.filter(dbl).length;
      const lines = [`Doubles — spare copies to trade (${totalDoubles}):`];
      for (const label of groupOrder) {
        const parts = groups.get(label).map(n => {
          const spare = collection[n] - 1;   // keep one for the album
          return spare > 1 ? `${n} (×${spare})` : `${n}`;
        });
        lines.push(`${label}: ${parts.join(', ')}`);
      }
      return lines.join('\n');
    },

    applyImport(existing, imported, mode) {
      // Legacy shape: bare { "1": 2, "5": 1 } or [1,5,5] → collection only, reserved stays.
      // New shape:    { collection: {...}, reserved: {...} } → both.
      let importedCollection = imported;
      let importedReserved = null;
      if (imported && typeof imported === 'object' && !Array.isArray(imported) &&
          (imported.collection !== undefined || imported.reserved !== undefined)) {
        importedCollection = imported.collection || {};
        importedReserved = imported.reserved || {};
      }

      const normalized = {};
      if (Array.isArray(importedCollection)) {
        for (const n of importedCollection) {
          if (typeof n !== 'number' || n < 1 || n > 630) continue;
          normalized[n] = (normalized[n] || 0) + 1;
        }
      } else if (importedCollection && typeof importedCollection === 'object') {
        for (const [k, v] of Object.entries(importedCollection)) {
          const n = parseInt(k, 10);
          const c = typeof v === 'number' ? v : parseInt(v, 10);
          if (!Number.isFinite(n) || n < 1 || n > 630) continue;
          if (!Number.isFinite(c) || c < 1) continue;
          normalized[n] = c;
        }
      }

      // Only the collection field participates in merge/replace math.
      // Reserved is always REPLACED wholesale (it's a small transient set;
      // merging semantics for reservations would be confusing).
      let out;
      if (mode === 'replace') {
        out = { collection: normalized };
      } else {
        const merged = { ...existing };
        for (const [k, v] of Object.entries(normalized)) {
          merged[k] = (merged[k] || 0) + v;
        }
        out = { collection: merged };
      }

      if (importedReserved !== null) {
        const cleanReserved = {};
        for (const [k, v] of Object.entries(importedReserved)) {
          const n = parseInt(k, 10);
          const c = typeof v === 'number' ? v : parseInt(v, 10);
          if (!Number.isFinite(n) || n < 1 || n > 630) continue;
          if (!Number.isFinite(c) || c < 1) continue;
          cleanReserved[n] = c;
        }
        out.reserved = cleanReserved;
      }
      return out;
    },

    matchesSearch(card, query) {
      if (!query || !query.trim()) return true;
      const q = query.trim().toLowerCase();
      const rangeMatch = q.match(/^(\d+)\s*-\s*(\d+)$/);
      if (rangeMatch) {
        const lo = parseInt(rangeMatch[1], 10);
        const hi = parseInt(rangeMatch[2], 10);
        if (lo <= hi) return card.number >= lo && card.number <= hi;
        return false;
      }
      if (String(card.number) === q) return true;
      if (card.team && card.team.toLowerCase() === q) return true;
      if (card.position && card.position.toLowerCase() === q) return true;
      if (card.teamName && card.teamName.toLowerCase().includes(q)) return true;
      if (card.player && card.player.toLowerCase().includes(q)) return true;
      return false;
    },

    STORAGE_KEY: 'panini_wc2026_collection',
    RESERVED_KEY: 'panini_wc2026_reserved',

    storageAvailable() {
      try {
        const t = '__t__';
        localStorage.setItem(t, t);
        localStorage.removeItem(t);
        return true;
      } catch (_) { return false; }
    },

    loadCollection() {
      try {
        const raw = localStorage.getItem(this.STORAGE_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return {};
        const clean = {};
        for (const [k, v] of Object.entries(parsed)) {
          const n = parseInt(k, 10);
          const c = parseInt(v, 10);
          if (n >= 1 && n <= 630 && c >= 1) clean[n] = c;
          else if (Number.isFinite(n) && (n < 1 || n > 630)) console.warn('ignoring out-of-range card', k);
        }
        return clean;
      } catch (_) { return {}; }
    },

    saveCollection(collection) {
      try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(collection)); }
      catch (_) { /* storage disabled — silently swallow, Task 13 adds a visible banner */ }
    },

    loadReserved() {
      try {
        const raw = localStorage.getItem(this.RESERVED_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return {};
        const clean = {};
        for (const [k, v] of Object.entries(parsed)) {
          const n = parseInt(k, 10);
          const c = parseInt(v, 10);
          if (n >= 1 && n <= 630 && c >= 1) clean[n] = c;
        }
        return clean;
      } catch (_) { return {}; }
    },

    saveReserved(reserved) {
      try { localStorage.setItem(this.RESERVED_KEY, JSON.stringify(reserved)); }
      catch (_) { /* storage disabled */ }
    },
  };
</script>

  <script>
  // ==== Boot ====
  (async () => {
    const app = window.__paniniApp;
    const grid = document.getElementById('grid');
    const ownedCountEl = document.getElementById('ownedCount');
    const ownedTotalEl = document.getElementById('ownedTotal');
    const ownedPctEl = document.getElementById('ownedPct');
    const overallBarEl = document.getElementById('overallBar');
    const banner = document.getElementById('banner');

    // Storage-disabled banner (yellow, warning). Not dismissable — the state is persistent.
    if (!app.storageAvailable()) {
      banner.hidden = false;
      banner.textContent = '⚠ Storage disabled — your collection will not persist. Use Export to save manually.';
    }

    let checklist;
    try {
      const res = await fetch('checklist.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      checklist = await res.json();
      if (!Array.isArray(checklist) || checklist.length === 0) {
        throw new Error('checklist.json is empty or not an array');
      }
    } catch (err) {
      console.error('Failed to load checklist.json:', err);
      banner.hidden = false;
      banner.classList.add('error');
      banner.textContent = '';   // clear any earlier storage warning; the fatal error takes precedence
      const msg = document.createElement('span');
      msg.textContent = 'Failed to load checklist.json — ' + err.message + '. ';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = 'Reload';
      btn.addEventListener('click', () => location.reload());
      banner.append(msg, btn);
      return;
    }

    let collection = app.loadCollection();
    let reserved = app.loadReserved();

    let filter = { kind: 'all', value: null };  // kind: 'all' | 'team' | 'section'
    let chip = 'all';         // 'all' | 'owned' | 'missing' | 'doubles'
    let searchQuery = '';

    function cardVisible(c) {
      // Section/team filter
      if (filter.kind === 'team' && c.team !== filter.value) return false;
      if (filter.kind === 'section' && c.section !== filter.value) return false;
      // Chip
      const count = collection[c.number] || 0;
      const isIncoming = count < 1 && (reserved[c.number] || 0) > 0;
      if (chip === 'owned' && count < 1) return false;
      if (chip === 'missing' && (count >= 1 || isIncoming)) return false;
      if (chip === 'incoming' && !isIncoming) return false;
      if (chip === 'doubles' && count < 2) return false;
      // Search
      if (!app.matchesSearch(c, searchQuery)) return false;
      return true;
    }

    function renderTile(c) {
      const count = collection[c.number] || 0;
      const owned = count >= 1;
      const isReserved = !owned && (reserved[c.number] || 0) > 0;

      const tile = document.createElement('div');
      tile.className = 'tile' + (owned ? ' owned' : '') + (isReserved ? ' reserved' : '');
      tile.dataset.number = c.number;

      if (c.position) {
        const pos = document.createElement('span');
        pos.className = 'pos pos-' + c.position.toLowerCase();
        pos.title = c.position;
        pos.setAttribute('aria-label', c.position);
        tile.appendChild(pos);
      }

      const num = document.createElement('span');
      num.className = 'num';
      num.textContent = '#' + c.number;
      if (count > 1) {
        const dup = document.createElement('span');
        dup.className = 'dup';
        dup.textContent = '×' + count;
        num.append(' ', dup);
      }
      if (isReserved) {
        const rsv = document.createElement('span');
        rsv.className = 'rsv';
        rsv.title = 'Reserved for trade';
        rsv.textContent = '⇄';
        num.append(' ', rsv);
      }

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = c.player;

      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = c.team || c.section;

      tile.append(num, name, meta);
      return tile;
    }

    function renderAll() {
      grid.textContent = '';
      for (const c of checklist) {
        if (!cardVisible(c)) continue;
        grid.appendChild(renderTile(c));
      }
      const stats = app.computeStats(checklist, collection, reserved);
      ownedCountEl.textContent = stats.owned;
      ownedTotalEl.textContent = stats.total;
      ownedPctEl.textContent = stats.pct + '%';
      overallBarEl.style.width = stats.pct + '%';
      renderSummary(stats);
    }

    function renderSummary(stats) {
      const summary = document.getElementById('summary');
      summary.textContent = '';

      function row(kind, value, label, owned, incoming, total) {
        const pct = total > 0 ? Math.round(100 * owned / total) : 0;
        const el = document.createElement('div');
        el.className = 'summary-row' + (kind === 'section' ? ' section' : '');
        if (filter.kind === kind && filter.value === value) el.classList.add('active');
        // Complete via owned = green. Complete only via owned+incoming = orange.
        // Partial rows show plain owned/total; incoming doesn't inflate the numerator.
        const trulyComplete = total > 0 && owned === total;
        const completeViaIncoming = !trulyComplete && total > 0 && owned + incoming === total;
        if (trulyComplete) el.classList.add('complete');
        else if (completeViaIncoming) el.classList.add('complete-incoming');
        el.dataset.kind = kind;
        el.dataset.value = value;

        const lbl = document.createElement('span');
        lbl.className = 'lbl';
        lbl.textContent = label;
        lbl.title = label;

        const bar = document.createElement('div');
        bar.className = 'bar';
        const barFill = document.createElement('div');
        barFill.style.width = pct + '%';
        bar.appendChild(barFill);

        const num = document.createElement('span');
        num.className = 'num';
        num.textContent = (completeViaIncoming ? total : owned) + '/' + total;

        el.append(lbl, bar, num);
        return el;
      }

      // Teams (sorted alphabetically by name)
      const teams = Object.entries(stats.perTeam)
        .sort(([, a], [, b]) => a.name.localeCompare(b.name));
      if (teams.length > 0) {
        const h = document.createElement('h3');
        h.textContent = 'Teams';
        summary.appendChild(h);
        for (const [code, info] of teams) {
          const flag = app.teamFlag(code);
          const label = flag ? flag + ' ' + code : code;
          summary.appendChild(row('team', code, label, info.owned, info.incoming, info.total));
        }
      }

      // Special sets (in SECTION_ORDER, excluding the 'team' pseudo-section)
      const sets = app.SECTION_ORDER
        .filter(s => s !== 'team' && stats.perSection[s]);
      if (sets.length > 0) {
        const h = document.createElement('h3');
        h.textContent = 'Special sets';
        summary.appendChild(h);
        for (const s of sets) {
          const info = stats.perSection[s];
          summary.appendChild(row('section', s, app.SECTION_LABELS[s], info.owned, info.incoming, info.total));
        }
      }

      // Show-all button (only when a filter is active)
      if (filter.kind !== 'all') {
        const btn = document.createElement('button');
        btn.id = 'clearFilter';
        btn.type = 'button';
        btn.textContent = 'Show all';
        summary.appendChild(btn);
      }
    }

    function toggle(n) {
      const cur = collection[n] || 0;
      if (cur === 0) { collection[n] = 1; delete reserved[n]; }
      else delete collection[n];
      app.saveCollection(collection);
      app.saveReserved(reserved);
      renderAll();
    }

    const cardEditModal = document.getElementById('cardEditModal');
    const cardEditTitle = document.getElementById('cardEditTitle');
    const cardEditCount = document.getElementById('cardEditCount');
    const cardEditReserved = document.getElementById('cardEditReserved');
    const cardEditReservedRow = document.getElementById('cardEditReservedRow');
    let cardEditNumber = null;

    function openCardEdit(n) {
      cardEditNumber = n;
      const cur = collection[n] || 0;
      const rsv = (reserved[n] || 0) > 0;
      cardEditTitle.textContent = 'Card #' + n;
      cardEditCount.value = String(cur);
      cardEditReserved.checked = rsv;
      // "Incoming" only makes sense for missing cards (count 0). Once you own it,
      // it's not on the way anymore — hide the checkbox.
      cardEditReservedRow.style.display = cur === 0 ? '' : 'none';
      if (typeof cardEditModal.showModal === 'function') cardEditModal.showModal();
      else cardEditModal.setAttribute('open', '');
      cardEditCount.focus();
      cardEditCount.select();
    }

    function closeCardEdit() {
      if (typeof cardEditModal.close === 'function') cardEditModal.close();
      else cardEditModal.removeAttribute('open');
    }

    cardEditCount.addEventListener('input', () => {
      const v = parseInt(cardEditCount.value, 10);
      cardEditReservedRow.style.display = (Number.isFinite(v) && v === 0) ? '' : 'none';
    });

    document.getElementById('cardEditSave').addEventListener('click', () => {
      if (cardEditNumber === null) return;
      const n = cardEditNumber;
      const raw = cardEditCount.value.trim();
      const c = parseInt(raw, 10);
      if (!Number.isFinite(c) || c < 0 || String(c) !== raw) { closeCardEdit(); return; }
      if (c === 0) {
        delete collection[n];
        if (cardEditReserved.checked) reserved[n] = 1;
        else delete reserved[n];
      } else {
        collection[n] = c;
        delete reserved[n];   // card arrived — no longer "incoming"
      }
      app.saveCollection(collection);
      app.saveReserved(reserved);
      closeCardEdit();
      renderAll();
    });
    document.getElementById('cardEditCancel').addEventListener('click', closeCardEdit);

    function setExactCount(n) { openCardEdit(n); }

    let longPressed = false;
    let pressTimer = null;

    grid.addEventListener('click', (e) => {
      const tile = e.target.closest('.tile');
      if (!tile) return;
      if (longPressed) { longPressed = false; return; }
      toggle(parseInt(tile.dataset.number, 10));
    });

    grid.addEventListener('contextmenu', (e) => {
      const tile = e.target.closest('.tile');
      if (!tile) return;
      e.preventDefault();
      setExactCount(parseInt(tile.dataset.number, 10));
    });

    grid.addEventListener('touchstart', (e) => {
      const tile = e.target.closest('.tile');
      if (!tile) return;
      const n = parseInt(tile.dataset.number, 10);
      if (pressTimer) clearTimeout(pressTimer);
      pressTimer = setTimeout(() => {
        longPressed = true;
        setExactCount(n);
      }, 500);
    }, { passive: true });

    function cancelPress() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    }
    grid.addEventListener('touchend', cancelPress);
    grid.addEventListener('touchmove', cancelPress);
    grid.addEventListener('touchcancel', cancelPress);

    document.getElementById('summary').addEventListener('click', (e) => {
      if (e.target.id === 'clearFilter') {
        filter = { kind: 'all', value: null };
        renderAll();
        return;
      }
      const row = e.target.closest('.summary-row');
      if (!row) return;
      const kind = row.dataset.kind;
      const value = row.dataset.value;
      // Click again on the active row → clear filter (toggle off).
      if (filter.kind === kind && filter.value === value) {
        filter = { kind: 'all', value: null };
        renderAll();
        return;
      }
      filter = { kind, value };
      renderAll();
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderAll();
    });

    document.getElementById('chips').addEventListener('click', (e) => {
      const btn = e.target.closest('.chip');
      if (!btn) return;
      chip = btn.dataset.chip;
      for (const b of document.querySelectorAll('#chips .chip')) {
        b.classList.toggle('active', b === btn);
      }
      renderAll();
    });

    const form = document.getElementById('quickAddForm');
    const input = document.getElementById('quickAdd');
    const errEl = document.getElementById('quickAddError');
    const toastEl = document.getElementById('toast');
    let toastTimer = null;
    let toastHideTimer = null;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.hidden = false;
      // Force a reflow so the transition fires when we add the class.
      void toastEl.offsetWidth;
      toastEl.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      if (toastHideTimer) clearTimeout(toastHideTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove('show');
        toastHideTimer = setTimeout(() => { toastEl.hidden = true; }, 300);
      }, 1500);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const { valid, errors } = app.parseQuickAdd(input.value);
      const known = new Set(checklist.map(c => c.number));
      const shown = valid.filter(n => known.has(n));
      const orphan = valid.filter(n => !known.has(n));
      const parts = [];
      if (errors.length) parts.push('Rejected: ' + errors.join(', '));
      if (orphan.length) parts.push('Not in current checklist (still saved): ' + orphan.join(', '));
      errEl.textContent = parts.join(' · ');
      if (!valid.length) return;
      for (const n of valid) collection[n] = (collection[n] || 0) + 1;
      app.saveCollection(collection);
      input.value = '';
      renderAll();
      const shownLabel = shown.length + ' card' + (shown.length === 1 ? '' : 's');
      const orphanLabel = orphan.length ? ' (' + orphan.length + ' queued)' : '';
      showToast('+' + shownLabel + ' added' + orphanLabel);
    });

    // ==== Export / Import ====
    const modal = document.getElementById('textModal');
    const modalBody = document.getElementById('textModalBody');
    const modalTitle = document.getElementById('textModalTitle');

    function openTextModal(title, body) {
      modalTitle.textContent = title;
      modalBody.value = body;
      if (typeof modal.showModal === 'function') modal.showModal();
      else modal.setAttribute('open', '');
      modalBody.focus();
      modalBody.select();
    }

    function closeTextModal() {
      if (typeof modal.close === 'function') modal.close();
      else modal.removeAttribute('open');
    }

    document.getElementById('exportMenu').addEventListener('click', (e) => {
      const b = e.target.closest('button[data-export]');
      if (!b) return;
      const kind = b.dataset.export;

      if (kind === 'json') {
        const payload = Object.keys(reserved).length > 0
          ? { collection, reserved }
          : collection;   // stay compatible with old shape when there's nothing to reserve
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const date = new Date().toISOString().slice(0, 10);
        a.download = 'panini-collection-' + date + '.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('Downloaded ' + a.download);
      } else if (kind === 'missing') {
        openTextModal('Missing cards', app.formatMissingList(checklist, collection, reserved));
      } else if (kind === 'incoming') {
        openTextModal('Incoming cards', app.formatIncomingList(checklist, collection, reserved));
      } else if (kind === 'doubles') {
        openTextModal('Doubles', app.formatDoublesList(checklist, collection));
      }

      document.getElementById('exportMenu').open = false;
    });

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('exportMenu');
      if (menu.open && !menu.contains(e.target)) menu.open = false;
    });

    document.getElementById('textModalCopy').addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      try {
        await navigator.clipboard.writeText(modalBody.value);
      } catch (_) {
        modalBody.select();
        try { document.execCommand('copy'); } catch (_) { /* fallback failed too, silent */ }
      }
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    });

    document.getElementById('textModalClose').addEventListener('click', closeTextModal);

    const importFile = document.getElementById('importFile');
    importFile.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      let text, parsed;
      try {
        text = await file.text();
        parsed = JSON.parse(text);
      } catch (_) {
        alert('Import failed: not valid JSON.');
        e.target.value = '';
        return;
      }
      const merge = window.confirm(
        'OK = Merge (add counts on top of existing)\n' +
        'Cancel = Replace (wipe first, then apply)'
      );
      const result = app.applyImport(collection, parsed, merge ? 'merge' : 'replace');
      collection = result.collection;
      if (result.reserved !== undefined) reserved = result.reserved;
      app.saveCollection(collection);
      app.saveReserved(reserved);
      renderAll();
      showToast('Import applied');
      e.target.value = '';
    });

    // ==== Theme toggle (auto → light → dark → auto …) ====
    const themeBtn = document.getElementById('themeToggle');
    const THEMES = ['auto', 'light', 'dark'];
    const THEME_LABELS = { auto: '🖥 Auto', light: '☀️ Light', dark: '🌙 Dark' };

    function currentTheme() {
      const t = document.documentElement.getAttribute('data-theme');
      return THEMES.includes(t) ? t : 'auto';
    }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      themeBtn.textContent = THEME_LABELS[t];
      try {
        if (t === 'auto') localStorage.removeItem('panini_wc2026_theme');
        else localStorage.setItem('panini_wc2026_theme', t);
      } catch (_) { /* storage disabled */ }
    }
    applyTheme(currentTheme());   // sync button label with attribute set by head script

    themeBtn.addEventListener('click', () => {
      const i = THEMES.indexOf(currentTheme());
      applyTheme(THEMES[(i + 1) % THEMES.length]);
    });

    renderAll();
  })();
  </script>
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <dialog id="cardEditModal">
    <h3 id="cardEditTitle"></h3>
    <div style="display:flex;flex-direction:column;gap:.6rem;">
      <label style="display:flex;flex-direction:column;gap:.2rem;">
        <span>Copies owned</span>
        <input id="cardEditCount" type="number" min="0" step="1" style="padding:.3rem .5rem;font:inherit;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:4px;width:6rem;">
      </label>
      <label id="cardEditReservedRow" style="display:flex;align-items:center;gap:.4rem;">
        <input id="cardEditReserved" type="checkbox">
        <span>Incoming — trade agreed, card on the way</span>
      </label>
    </div>
    <menu>
      <button id="cardEditSave" type="button">Save</button>
      <button id="cardEditCancel" type="button">Cancel</button>
    </menu>
  </dialog>
  <dialog id="textModal">
    <h3 id="textModalTitle"></h3>
    <textarea id="textModalBody" rows="18" cols="60" readonly></textarea>
    <menu>
      <button id="textModalCopy" type="button">Copy</button>
      <button id="textModalClose" type="button">Close</button>
    </menu>
  </dialog>
</body>
