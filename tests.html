<!doctype html>
<meta charset="utf-8">
<title>Panini WC 2026 Tracker — Tests</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 1rem; }
  .pass { color: #0a7a2f; }
  .fail { color: #b00020; }
  pre { background: #f4f4f4; padding: .5rem; overflow-x: auto; white-space: pre-wrap; }
  h2 { margin-top: 2rem; }
</style>
<h1>Panini WC 2026 Tracker — Tests</h1>
<div id="results"></div>
<script>
const results = document.getElementById('results');
let passed = 0, failed = 0;

function t(name, fn) {
  try {
    const r = fn();
    if (r && typeof r.then === 'function') {
      return r.then(
        () => { results.insertAdjacentHTML('beforeend', `<div class="pass">✓ ${name}</div>`); passed++; },
        (err) => { results.insertAdjacentHTML('beforeend', `<div class="fail">✗ ${name}<pre>${(err && err.stack) || err}</pre></div>`); failed++; }
      );
    }
    results.insertAdjacentHTML('beforeend', `<div class="pass">✓ ${name}</div>`); passed++;
  } catch (err) {
    results.insertAdjacentHTML('beforeend', `<div class="fail">✗ ${name}<pre>${(err && err.stack) || err}</pre></div>`);
    failed++;
  }
}

function eq(a, b, msg) {
  const A = JSON.stringify(a), B = JSON.stringify(b);
  if (A !== B) throw new Error((msg || 'not equal') + `\n  expected: ${B}\n  actual:   ${A}`);
}

function ok(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }

// Load pure functions from index.html by fetching and evaluating the <script> tag
// that defines window.__paniniApp. Other <script> tags (theme init, boot IIFE)
// are skipped so tests.html doesn't accidentally re-run app boot logic.
async function loadAppFunctions() {
  const html = await fetch('index.html').then(r => r.text());
  const scripts = [...html.matchAll(/<script>([\s\S]*?)<\/script>/g)].map(m => m[1]);
  const src = scripts.find(s => s.includes('window.__paniniApp'));
  if (!src) throw new Error('no <script> defining window.__paniniApp in index.html');
  eval(src);
  if (!window.__paniniApp) throw new Error('window.__paniniApp not set after eval — check index.html');
  return window.__paniniApp;
}

async function main() {
  const checklist = await fetch('checklist.json').then(r => r.json());

  results.insertAdjacentHTML('beforeend', '<h2>checklist.json shape</h2>');

  // Pilot mode complete: enforcing strict length === 630 (backfilled 2026-07-03).
  t('has exactly 630 entries', () => {
    ok(checklist.length === 630, `unexpected length: ${checklist.length}`);
  });

  t('card numbers are unique and within 1..630', () => {
    const seen = new Set();
    for (const c of checklist) {
      ok(Number.isInteger(c.number), `#${c.number} not integer`);
      ok(c.number >= 1 && c.number <= 630, `#${c.number} out of range`);
      ok(!seen.has(c.number), `#${c.number} duplicated`);
      seen.add(c.number);
    }
  });

  t('every card has required fields', () => {
    for (const c of checklist) {
      ok(typeof c.number === 'number', `#${c.number} number missing`);
      ok(typeof c.player === 'string' && c.player.length > 0, `#${c.number} player missing`);
      ok(typeof c.section === 'string', `#${c.number} section missing`);
    }
  });

  t('position enum is legal', () => {
    const legal = new Set(['GK', 'DEF', 'MID', 'FWD', null]);
    for (const c of checklist) ok(legal.has(c.position), `#${c.number} bad position: ${c.position}`);
  });

  t('badge enum is legal', () => {
    const legal = new Set(['FF', 'IC', null]);
    for (const c of checklist) ok(legal.has(c.badge), `#${c.number} bad badge: ${c.badge}`);
  });

  t('section enum is legal', () => {
    const legal = new Set([
      'golden', 'team', 'contenders', 'goalMachines', 'topKeepers',
      'defensiveRocks', 'midfieldMaestros', 'masterRookies', 'extras',
    ]);
    for (const c of checklist) ok(legal.has(c.section), `#${c.number} bad section: ${c.section}`);
  });

  t('team ↔ teamName both null or both non-null', () => {
    for (const c of checklist) {
      const aNull = c.team === null || c.team === undefined;
      const bNull = c.teamName === null || c.teamName === undefined;
      ok(aNull === bNull, `#${c.number} team/teamName mismatch`);
    }
  });

  t('golden section covers cards 1..9 exactly', () => {
    const golden = checklist.filter(c => c.section === 'golden').map(c => c.number).sort((a, b) => a - b);
    eq(golden, [1, 2, 3, 4, 5, 6, 7, 8, 9]);
  });

  const app = await loadAppFunctions();

  results.insertAdjacentHTML('beforeend', '<h2>parseQuickAdd</h2>');

  t('parses single numbers', () => {
    const r = app.parseQuickAdd('10, 15, 88');
    eq(r.valid, [10, 15, 88]);
    eq(r.errors, []);
  });

  t('parses ranges', () => {
    const r = app.parseQuickAdd('22-25');
    eq(r.valid, [22, 23, 24, 25]);
    eq(r.errors, []);
  });

  t('mixes numbers and ranges', () => {
    const r = app.parseQuickAdd('1, 3-5, 9');
    eq(r.valid, [1, 3, 4, 5, 9]);
    eq(r.errors, []);
  });

  t('accepts whitespace or comma as separators', () => {
    const r = app.parseQuickAdd('  10   15,20-22 ');
    eq(r.valid, [10, 15, 20, 21, 22]);
    eq(r.errors, []);
  });

  t('rejects non-numeric tokens', () => {
    const r = app.parseQuickAdd('10, xyz, 15');
    eq(r.valid, [10, 15]);
    eq(r.errors, ['xyz']);
  });

  t('rejects out-of-range numbers', () => {
    const r = app.parseQuickAdd('0, 631, 700, 15');
    eq(r.valid, [15]);
    eq(r.errors, ['0', '631', '700']);
  });

  t('rejects malformed ranges', () => {
    const r = app.parseQuickAdd('5-3, 22-25');
    eq(r.valid, [22, 23, 24, 25]);
    eq(r.errors, ['5-3']);
  });

  t('empty string returns empty valid + empty errors', () => {
    const r = app.parseQuickAdd('  ');
    eq(r.valid, []);
    eq(r.errors, []);
  });

  t('preserves duplicate numbers (they add +1 each in caller)', () => {
    const r = app.parseQuickAdd('10, 10, 15');
    eq(r.valid, [10, 10, 15]);
    eq(r.errors, []);
  });

  t('preserves numbers that also appear inside ranges', () => {
    const r = app.parseQuickAdd('5-7, 6');
    eq(r.valid, [5, 6, 7, 6]);
    eq(r.errors, []);
  });

  t('single-element range n-n returns [n]', () => {
    const r = app.parseQuickAdd('10-10');
    eq(r.valid, [10]);
    eq(r.errors, []);
  });

  t('rejects malformed range shapes', () => {
    const r = app.parseQuickAdd('-5, 5-, 5-3-2, --');
    eq(r.valid, []);
    eq(r.errors, ['-5', '5-', '5-3-2', '--']);
  });

  t('accepts tabs and newlines as separators', () => {
    const r = app.parseQuickAdd('10\t15\n20');
    eq(r.valid, [10, 15, 20]);
    eq(r.errors, []);
  });

  t('leading zeros parse as decimal', () => {
    const r = app.parseQuickAdd('007, 015');
    eq(r.valid, [7, 15]);
    eq(r.errors, []);
  });

  results.insertAdjacentHTML('beforeend', '<h2>computeStats</h2>');

  t('empty collection: all zero', () => {
    const s = app.computeStats(checklist, {});
    eq(s.owned, 0);
    eq(s.total, checklist.length);
    eq(s.pct, 0);
  });

  t('one card owned', () => {
    const s = app.computeStats(checklist, { "1": 1 });
    eq(s.owned, 1);
    eq(s.total, checklist.length);
    eq(s.pct, Math.round(100 * 1 / checklist.length));
  });

  t('duplicates do not inflate owned count', () => {
    const s = app.computeStats(checklist, { "1": 5, "2": 3 });
    eq(s.owned, 2);
  });

  t('per-team totals count only team-section cards (not Golden Ballers)', () => {
    // Argentina in pilot has 12 team-section cards (numbers 22..33).
    const argTeamCards = checklist.filter(c => c.team === 'ARG' && c.section === 'team');
    ok(argTeamCards.length === 12, 'pilot ARG team section should have 12 cards');
    const collection = Object.fromEntries(argTeamCards.slice(0, 3).map(c => [c.number, 1]));
    const s = app.computeStats(checklist, collection);
    ok(s.perTeam.ARG, 'ARG entry missing');
    eq(s.perTeam.ARG.owned, 3);
    eq(s.perTeam.ARG.total, 12);
    eq(s.perTeam.ARG.name, 'Argentina');
  });

  t('Golden Baller with team=ARG does NOT bump perTeam.ARG counters', () => {
    // Card #1 is Messi Golden Baller with team=ARG, section=golden.
    const s = app.computeStats(checklist, { "1": 1 });
    ok(s.perTeam.ARG, 'ARG bucket should still be created (from team-section cards)');
    eq(s.perTeam.ARG.owned, 0, 'owning only the golden card must not credit team ARG');
    eq(s.perSection.golden.owned, 1);
  });

  t('per-section totals correct for golden', () => {
    const s = app.computeStats(checklist, { "1": 1, "3": 2, "9": 1 });
    eq(s.perSection.golden.owned, 3);
    eq(s.perSection.golden.total, 9);
  });

  t('unknown card numbers in collection are ignored', () => {
    const s = app.computeStats(checklist, { "9999": 1 });
    eq(s.owned, 0);
  });

  results.insertAdjacentHTML('beforeend', '<h2>formatMissingList / formatDoublesList</h2>');

  t('missing list header shows count', () => {
    // Pretend nothing is owned — missing count === checklist.length
    const out = app.formatMissingList(checklist, {});
    ok(out.startsWith(`Missing (${checklist.length}):`), 'header wrong: ' + out.split('\n')[0]);
  });

  t('missing list groups by section/team, comma-separates numbers', () => {
    // Own every card except 1, 3 in golden section
    const collection = {};
    for (const c of checklist) if (c.number !== 1 && c.number !== 3) collection[c.number] = 1;
    const out = app.formatMissingList(checklist, collection);
    ok(out.includes('Golden Ballers: 1, 3'), 'golden section missing not formatted:\n' + out);
  });

  t('doubles list only lists cards with count >= 2', () => {
    const collection = { "1": 1, "2": 2, "22": 3 };
    const out = app.formatDoublesList(checklist, collection);
    ok(!/(^|:\s)1\b/m.test(out), 'card #1 should not appear (count 1)');
    ok(out.includes('2 (×2)'), 'card #2 (×2) missing:\n' + out);
    ok(out.includes('22 (×3)'), 'card #22 (×3) missing:\n' + out);
  });

  t('doubles list header shows count of distinct doubled cards', () => {
    const collection = { "1": 2, "2": 3, "22": 1 };
    const out = app.formatDoublesList(checklist, collection);
    ok(out.startsWith('Doubles (2):'), 'header wrong: ' + out.split('\n')[0]);
  });

  t('missing list uses team name for team cards, section label for others', () => {
    // Own everything except (a) all golden, (b) all Argentina team cards.
    const collection = {};
    for (const c of checklist) {
      const isGolden = c.section === 'golden';
      const isArgTeam = c.team === 'ARG' && c.section === 'team';
      if (!isGolden && !isArgTeam) collection[c.number] = 1;
    }
    const out = app.formatMissingList(checklist, collection);
    ok(out.includes('Golden Ballers:'), 'expected Golden Ballers section header');
    ok(out.includes('Argentina:'), 'expected Argentina team header');
  });

  t('missing list is empty (only header) when everything is owned', () => {
    const collection = {};
    for (const c of checklist) collection[c.number] = 1;
    const out = app.formatMissingList(checklist, collection);
    eq(out, 'Missing (0):');
  });

  t('doubles list is empty (only header) when no doubles', () => {
    const collection = {};
    for (const c of checklist) collection[c.number] = 1;
    const out = app.formatDoublesList(checklist, collection);
    eq(out, 'Doubles (0):');
  });

  results.insertAdjacentHTML('beforeend', '<h2>applyImport</h2>');

  t('array form → each becomes count 1 (replace mode)', () => {
    const r = app.applyImport({}, [1, 15, 22], 'replace');
    eq(r, { "1": 1, "15": 1, "22": 1 });
  });

  t('object form → passthrough (replace mode)', () => {
    const r = app.applyImport({ "99": 5 }, { "1": 2, "15": 1 }, 'replace');
    eq(r, { "1": 2, "15": 1 });
  });

  t('merge mode adds counts on top of existing', () => {
    const r = app.applyImport({ "1": 1, "2": 1 }, { "1": 2, "3": 1 }, 'merge');
    eq(r, { "1": 3, "2": 1, "3": 1 });
  });

  t('merge mode with array form adds 1 to each', () => {
    const r = app.applyImport({ "1": 2 }, [1, 2], 'merge');
    eq(r, { "1": 3, "2": 1 });
  });

  t('ignores out-of-range numbers silently', () => {
    const r = app.applyImport({}, { "9999": 3, "0": 2, "5": 1 }, 'replace');
    eq(r, { "5": 1 });
  });

  t('ignores zero/negative counts in imported object', () => {
    const r = app.applyImport({}, { "1": 0, "2": -1, "3": 1 }, 'replace');
    eq(r, { "3": 1 });
  });

  t('array items outside 1..630 are skipped', () => {
    const r = app.applyImport({}, [1, 0, 631, 700, 5], 'replace');
    eq(r, { "1": 1, "5": 1 });
  });

  t('array with duplicates increments the same key', () => {
    const r = app.applyImport({}, [5, 5, 5], 'replace');
    eq(r, { "5": 3 });
  });

  results.insertAdjacentHTML('beforeend', '<h2>matchesSearch</h2>');

  t('matches card number exactly', () => {
    const c = { number: 25, team: 'ARG', teamName: 'Argentina', player: 'Lionel Messi' };
    ok(app.matchesSearch(c, '25'));
    ok(!app.matchesSearch(c, '250'));
  });

  t('matches team code case-insensitively', () => {
    const c = { number: 25, team: 'ARG', teamName: 'Argentina', player: 'Lionel Messi' };
    ok(app.matchesSearch(c, 'arg'));
    ok(app.matchesSearch(c, 'ARG'));
  });

  t('matches team name substring', () => {
    const c = { number: 25, team: 'ARG', teamName: 'Argentina', player: 'Lionel Messi' };
    ok(app.matchesSearch(c, 'argen'));
  });

  t('matches player name substring case-insensitively', () => {
    const c = { number: 25, team: 'ARG', teamName: 'Argentina', player: 'Lionel Messi' };
    ok(app.matchesSearch(c, 'messi'));
    ok(app.matchesSearch(c, 'lionel'));
  });

  t('empty query matches everything', () => {
    const c = { number: 25, team: 'ARG', teamName: 'Argentina', player: 'Lionel Messi' };
    ok(app.matchesSearch(c, ''));
    ok(app.matchesSearch(c, '  '));
  });

  t('rejects non-matches', () => {
    const c = { number: 25, team: 'ARG', teamName: 'Argentina', player: 'Lionel Messi' };
    ok(!app.matchesSearch(c, 'ronaldo'));
  });

  t('handles null team/teamName without crashing', () => {
    const c = { number: 625, team: null, teamName: null, player: 'Official Mascot — Maple' };
    ok(app.matchesSearch(c, 'maple'));
    ok(app.matchesSearch(c, '625'));
    ok(!app.matchesSearch(c, 'argentina'));
  });

  results.insertAdjacentHTML('beforeend',
    `<h2>${failed === 0 ? '✅' : '❌'} ${passed} passed, ${failed} failed</h2>`);
}

main().catch(err => {
  results.insertAdjacentHTML('beforeend', `<div class="fail">FATAL: ${err && err.stack || err}</div>`);
});
</script>
